# Draft RegenOS -> JobDone work package shape.
# This should stay simple until tested in the field.

work_package:
  id: wet-corner-demo-work-package
  project_id: example-wet-corner-project
  title: Wet corner restoration demo
  status: draft
  lifecycle_gate:
    state: exploring
    work_allowed: false
    warning: Do not start work or buy materials until an agreement is accepted and the agreement start date has arrived.

interventions:
  - id: pond-1
    template: pond
    title: Create wildlife pond
    location: null
    evidence_required:
      - before_photo
      - gps_location
      - after_photo
      - dimensions
      - invoice_or_labour_record
  - id: check-dam-1
    template: check-dam
    title: Install first check dam
    location: null
    evidence_required:
      - before_photo_upstream
      - before_photo_downstream
      - gps_location
      - after_photo_upstream
      - after_photo_downstream
      - dimensions

jobs:
  - id: task-000
    intervention_id: check-dam-1
    title: Check grant application readiness
    description: Confirm land parcels, maps, management control, existing agreements, adviser support, and consent questions before applying.
    phase: pre_application
    gate: application_ready
    assignee: null
    location: null
    evidence_required:
      - type: checklist
        fields:
          - rural_payments_land_registered
          - maps_checked
          - management_control_confirmed
          - existing_agreements_checked
          - adviser_support_checked
          - consents_checked
    completion_criteria:
      - Application readiness questions answered.
      - Missing evidence recorded as tasks.

  - id: task-001
    intervention_id: pond-1
    title: Take pond before photos
    description: Take clear photos of the proposed pond site before work begins.
    phase: pre_application
    assignee: null
    location: null
    evidence_required:
      - type: photo
        count_min: 2
        notes: Include wider context and close view.
    completion_criteria:
      - At least two photos uploaded.
      - GPS metadata present or manually confirmed.

  - id: task-002
    intervention_id: pond-1
    title: Record pond GPS location
    description: Record the proposed pond centre point or boundary.
    phase: before_work
    assignee: null
    location: null
    evidence_required:
      - type: gps_point_or_polygon
    completion_criteria:
      - Location recorded and reviewed.

  - id: task-003
    intervention_id: check-dam-1
    title: Install check dam
    description: Install small check dam only after permissions and downstream risks have been checked.
    phase: delivery
    gate: work_allowed
    assignee: null
    location: null
    evidence_required:
      - type: after_photo_upstream
      - type: after_photo_downstream
      - type: measurement
        fields:
          - height
          - width
          - overflow_route
    completion_criteria:
      - Structure photographed.
      - Measurements recorded.
      - Overflow route noted.

  - id: task-004
    intervention_id: check-dam-1
    title: Assemble claim pack
    description: Prepare after-work photos, invoices, permissions, measurements, and any required maps for claim submission.
    phase: claim
    gate: claim_ready
    assignee: null
    location: null
    evidence_required:
      - type: after_photo
      - type: invoice_or_timesheet
      - type: permission_document
      - type: measurement
    completion_criteria:
      - Work is complete.
      - Claim evidence is present or missing items are listed.

  - id: task-005
    intervention_id: check-dam-1
    title: Review estimate against actuals
    description: Record actual grant income, costs, what went better, what went worse, and lessons for next time.
    phase: payment_review
    gate: reviewed
    assignee: null
    location: null
    evidence_required:
      - type: budget_actuals
      - type: variance_review
    completion_criteria:
      - Actual costs recorded.
      - Variance explanation recorded.
      - Lesson for next time recorded.

export:
  target: JobDone
  format: yaml
  version: draft-0.1
