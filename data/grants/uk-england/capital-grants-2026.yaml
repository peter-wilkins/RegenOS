  - id: uk-england.capital-grants-2026/rp8-constructed-wetlands-for-pollution
    name: "RP8: Constructed wetlands for the treatment of pollution"
    status: draft
    confidence: medium
    source_urls:
      - https://www.gov.uk/countryside-stewardship-grants/constructed-wetlands-for-the-treatment-of-pollution-rp8
    intervention_templates:
      - wetland-restoration
      - runoff-control
    payment: { type: percent_actual_cost, amount: 50, currency: GBP, unit: actual_cost_percent }
    eligibility_rules:
      - id: needs-plan-or-study
        kind: human_confirmation
        description: Must be alongside a feasibility study or Catchment Sensitive Farming water holding structure action plan.
      - id: pollution-treatment-purpose
        kind: human_or_gis_confirmation
        description: Use to treat field or farmyard diffuse runoff, not slurry, silage liquor, heavily contaminated water, or concentrated pesticide spills.
      - id: quotes-required
        kind: human_confirmation
        description: Three written quotations are required with the application.
      - id: consent-check
        kind: human_confirmation
        description: Check Environment Agency, local flood authority, internal drainage board, and planning authority requirements before work.
    evidence_requirements:
      - { id: plan-or-study, phase: application, evidence_type: plan_or_feasibility_study, description: Feasibility study or CSF water holding structure action plan. }
      - { id: quotes, phase: application, evidence_type: quote, description: Three written quotations and selected quote agreement. }
      - { id: before-photos, phase: before_work, evidence_type: photo, description: Photos of site before work starts. }
      - { id: during-photos, phase: claim, evidence_type: photo, description: Photos during construction stages or technical completion documents. }
      - { id: completed-photos, phase: claim, evidence_type: photo, description: Photos of completed wetland. }
      - { id: consents, phase: claim, evidence_type: permission_document, description: Any relevant consents or evidence that consent is not needed. }
      - { id: invoices, phase: claim, evidence_type: invoice_or_bank_statement, description: Receipted invoices or bank statements. }

