    evidence_requirements:
      - id: csf-written-support
        phase: application
        evidence_type: adviser_support
        description: Written support from Catchment Sensitive Farming adviser.
      - id: before-photos
        phase: before_work
        evidence_type: photo
        description: Photos of the existing site before work starts.
      - id: completed-photos
        phase: claim
        evidence_type: photo
        description: Photos of completed works in place and installed.
      - id: consents
        phase: claim
        evidence_type: permission_document
        description: Any relevant consents and permissions.
      - id: invoices
        phase: claim
        evidence_type: invoice_or_bank_statement
        description: Receipted invoices or bank statements where needed.
      - id: plan-if-applicable
        phase: application
        evidence_type: plan_or_feasibility_study
        description: Feasibility study, woodland management plan, or water holding structure action plan where applicable.
    compatibility:
      can_be_used_with:
